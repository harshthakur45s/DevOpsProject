name: DevOps CI Pipeline

on:
  push:
    branches:
      - main

jobs:

  build-and-dockerize:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      # =========================
      # JAVA SETUP
      # =========================

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      # =========================
      # BUILD BACKEND
      # =========================

      - name: Build Backend
        working-directory: BackendDevOps
        run: mvn clean package -DskipTests

      # =========================
      # NODE SETUP
      # =========================

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # =========================
      # BUILD FRONTEND
      # =========================

      - name: Install Frontend Dependencies
        working-directory: FrontendDevOps
        run: npm install

      - name: Build Frontend
        working-directory: FrontendDevOps
        run: npm run build

      # =========================
      # DOCKER BUILDS
      # =========================

      - name: Build Backend Docker Image
        working-directory: BackendDevOps
        run: docker build -t backend-app .

      - name: Build Frontend Docker Image
        working-directory: FrontendDevOps
        run: docker build -t frontend-app .